<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Employee Form</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #e6e0e0;
            margin: 0;
            padding: 0;
        }

        .container {
            width: 400px;
            background: #f5f5f5;
            margin: 80px auto;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }

        h2 {
            text-align: center;
            margin-bottom: 25px;
        }

        label {
            font-weight: bold;
            display: block;
            margin-top: 15px;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin-top: 6px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

        button {
            width: 100%;
            margin-top: 25px;
            padding: 12px;
            background: #9999ff;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #9999ff;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>บันทึกข้อมูลพนักงาน</h2>

    <form>
        <label>Full Name</label>
        <input type="text" name="fullname">

        <label>Email</label>
        <input type="email" name="email">

        <label>Position</label>
        <select name="position">
            <option>Manager</option>
            <option>Staff</option>
            <option>Intern</option>
        </select>

        <label>Phone Number</label>
        <input type="text" name="phone">

        <button type="submit">Submit</button>
    </form>
</div>

</body>
</html>
